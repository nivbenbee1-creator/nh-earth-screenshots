name: NH Earth Pin Capture

on:
  workflow_dispatch:
    inputs:
      lat: # תואם ל-"lat" בנוד של n8n
        description: 'Latitude'
        required: true
      lng: # תואם ל-"lng" בנוד של n8n
        description: 'Longitude'
        required: true

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Run Pin Capture
        # הפעלה של הסקריפט החדש עם הנתונים מ-n8n
        run: node capture_pin.js "${{ github.event.inputs.lat }}" "${{ github.event.inputs.lng }}"
