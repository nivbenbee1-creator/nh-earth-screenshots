name: NH Earth Screenshots

on:
  workflow_dispatch:
    inputs:
      polygon:
        description: 'Polygon Coordinates (Lat,Lng|Lat,Lng...)'
        required: true
        default: '36.2496,-91.7462|36.2498,-91.7462|36.2498,-91.7467|36.2496,-91.7467'

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Capture polygon screenshots
        # השלב הזה מריץ את הצילום ושולח אוטומטית ל-n8n כבינארי
        run: node capture_polygon.js "${{ github.event.inputs.polygon }}"
